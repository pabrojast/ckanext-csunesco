csunesco-css:
  output: css/csunesco.css
  contents:
    - css/csunesco.css

csunesco-js:
  filters: rjsmin
  output: js/csunesco.js
  extra:
    preload:
      - base/main
  contents:
    - js/csunesco.js

# Standalone project-region map behaviour. No base/main preload: it depends only
# on Leaflet (loaded via CDN in the landing template) and vanilla DOM APIs.
cs-map-js:
  filters: rjsmin
  output: js/cs-map.js
  contents:
    - js/cs-map.js
